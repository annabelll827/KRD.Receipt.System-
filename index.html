<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>چوونەژوورەوە — ROMA STONE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <div class="card">

    <div class="logo">
      <svg viewBox="0 0 64 64" width="46" height="46">
        <rect x="4" y="30" width="56" height="26" fill="none" stroke="#2b2b2b" stroke-width="2.5"/>
        <rect x="4" y="30" width="56" height="6" fill="#2b2b2b"/>
        <g fill="none" stroke="#2b2b2b" stroke-width="2.2">
          <path d="M12 44 a4 4 0 0 1 8 0"/>
          <path d="M24 44 a4 4 0 0 1 8 0"/>
          <path d="M36 44 a4 4 0 0 1 8 0"/>
          <path d="M48 44 a4 4 0 0 1 8 0"/>
        </g>
        <path d="M8 30 a24 24 0 0 1 48 0" fill="none" stroke="#2b2b2b" stroke-width="2.5"/>
      </svg>
    </div>

    <h1 class="brand">ROMA STONE</h1>
    <p class="subtitle">کارگەی ڕۆما</p>

    <div class="divider"></div>

    <form id="loginForm" onsubmit="return handleLogin(event)">

      <div class="field">
        <label>ناوی بەکارهێنەر</label>
        <input type="text" id="username" placeholder="ناوی بەکارهێنەر" required>
      </div>

      <div class="field">
        <label>وشەی نهێنی</label>
        <input type="password" id="password" placeholder="وشەی نهێنی" required>
      </div>

      <p class="error-msg" id="errorMsg"></p>

      <button type="submit" class="login-btn">
        چوونەژوورەوە
        <span class="arrow">→</span>
      </button>

    </form>

  </div>
</div>

<script src="script.js"></script>
</body>
