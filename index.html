<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>چوونەژوورەوە | KRD Receipt System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <img src="https://cdn-icons-png.flaticon.com/512/2721/2721291.png" alt="System Logo">
            <div class="brand-name">KRD Receipt System</div>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">ناوی بەکارهێنەر</label>
                <input type="text" id="username" required>
            </div>

            <div class="input-group">
                <label for="password">وشەی نهێنی</label>
                <input type="password" id="password" required>
            </div>

            <button type="submit" class="btn-login">
                <span class="login-icon"></span>
                چوونەژوورەوە
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            // پشکنینی ناو و پاسوۆردی نوێ
            if (usernameInput === "Callvin" && passwordInput === "654321") {
                alert('چوونەژوورەوە سەرکەوتوو بوو!');
                window.location.href = "dashboard.html"; 
            } else {
                alert('ناوی بەکارهێنەر یان وشەی نهێنی هەڵەیە!');
            }
        });
    </script>

</body>
</html>
