<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پانێڵی بەڕێوبەر</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        .btn { padding: 5px 10px; cursor: pointer; border: none; border-radius: 4px; }
        .del { background: #e74c3c; color: #fff; }
        .edit { background: #3498db; color: #fff; }
        .res { background: #2ecc71; color: #fff; }
    </style>
</head>
<body>
    <h2>پانێڵی بەڕێوبەر</h2>
    <a href="dashboard.html">گەڕانەوە بۆ داشبۆرد</a>
    
    <table>
        <thead>
            <tr>
                <th>کڕیار</th>
                <th>کۆی گشتی</th>
                <th>دۆخ</th>
                <th>کردارەکان</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>

    <script>
        function loadAdmin() {
            let receipts = JSON.parse(localStorage.getItem('savedReceipts')) || [];
            let body = document.getElementById('adminBody');
            body.innerHTML = '';

            receipts.forEach((r, index) => {
                body.innerHTML += `
                    <tr>
                        <td>${r.name}</td>
                        <td>$${r.total}</td>
                        <td>${r.status || 'سڕاوەتەوە'}</td>
                        <td>
                            <button class="edit" onclick="editReceipt(${index})">ئیدیت</button>
                            <button class="del" onclick="deleteReceipt(${index})">سڕینەوە</button>
                            ${r.status === 'سڕاوەتەوە' ? `<button class="res" onclick="restoreReceipt(${index})">گەڕانەوە</button>` : ''}
                        </td>
                    </tr>
                `;
            });
        }

        function deleteReceipt(index) {
            let receipts = JSON.parse(localStorage.getItem('savedReceipts'));
            // لێرە وەسڵەکە بە تەواوی ناسڕینەوە، تەنها دۆخەکەی دەگۆڕین بۆ 'سڕاوەتەوە'
            receipts[index].status = 'سڕاوەتەوە';
            localStorage.setItem('savedReceipts', JSON.stringify(receipts));
            loadAdmin();
        }

        function restoreReceipt(index) {
            let receipts = JSON.parse(localStorage.getItem('savedReceipts'));
            receipts[index].status = 'بارکراو'; // دەگەڕێتەوە دۆخی ئاسایی
            localStorage.setItem('savedReceipts', JSON.stringify(receipts));
            loadAdmin();
        }

        function editReceipt(index) {
            localStorage.setItem('editIndex', index);
            window.location.href = 'create-receipt.html';
        }

        loadAdmin();
    </script>
</body>
</html>
