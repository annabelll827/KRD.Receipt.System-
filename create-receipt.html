<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head><meta charset="UTF-8"><title>دروستکردنی وەسڵ</title></head>
<body>
<div style="max-width: 600px; margin: auto; background: white; padding: 20px;">
    <h3>دروستکردنی وەسڵ</h3>
    <input type="text" id="custName" placeholder="ناوی کڕیار" style="width:100%; padding:10px; margin:10px 0;">
    <input type="number" id="total" placeholder="کۆی گشتی" style="width:100%; padding:10px; margin:10px 0;">
    <input type="radio" name="pay" value="قەرز"> قەرز
    <input type="radio" name="pay" value="پارەنەدراو"> پارەنەدراو
    <input type="radio" name="pay" value="بارکراو"> بارکراو
    <button style="width:100%; padding:15px; background:#e91e63; color:white; border:none; margin-top:20px;" onclick="save()">پاشەکەوتکردن</button>
</div>
<script>
    let editIndex = localStorage.getItem('editIndex');
    function save() {
        let list = JSON.parse(localStorage.getItem('savedReceipts') || '[]');
        let r = { 
            customerName: document.getElementById('custName').value, 
            grandTotal: document.getElementById('total').value,
            status: document.querySelector('input[name="pay"]:checked').value 
        };
        if(editIndex !== null) { list[editIndex] = r; localStorage.removeItem('editIndex'); }
        else { list.push(r); }
        localStorage.setItem('savedReceipts', JSON.stringify(list));
        location.href = 'dashboard.html';
    }
</script>
</body>
</html>
