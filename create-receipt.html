<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دروستکردن/ئیدیت</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f4f6f9; }
        .container { max-width: 400px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; }
        .btn { width: 100%; padding: 12px; background: #e91e63; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h2 id="title">وەسڵ</h2>
    <input type="text" id="customerName" placeholder="ناوی کڕیار">
    <input type="number" id="total" placeholder="کۆی گشتی">
    <select id="status"><option value="بارکراو">بارکراو</option><option value="قەرز">قەرز</option><option value="بارنەکراو">بارنەکراو</option></select>
    <button class="btn" onclick="saveReceipt()">پاشەکەوتکردن</button>
</div>
<script>
    const editIndex = localStorage.getItem('editIndex');
    if (editIndex !== null) {
        let r = JSON.parse(localStorage.getItem('savedReceipts'))[editIndex];
        document.getElementById('customerName').value = r.name;
        document.getElementById('total').value = r.total;
        document.getElementById('status').value = r.status;
    }
    function saveReceipt() {
        let receipts = JSON.parse(localStorage.getItem('savedReceipts')) || [];
        let data = { name: document.getElementById('customerName').value, total: document.getElementById('total').value, status: document.getElementById('status').value, date: new Date().toISOString() };
        if (editIndex !== null) { receipts[editIndex] = data; localStorage.removeItem('editIndex'); }
        else { receipts.push(data); }
        localStorage.setItem('savedReceipts', JSON.stringify(receipts));
        alert('بە سەرکەوتوویی پاشەکەوت کرا');
        window.location.href = 'dashboard.html';
    }
</script>
</body>
</html>
