<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دروستکردن یان ئیدیتکردنی وەسڵ</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f6f9; }
        input { width: 100%; padding: 10px; margin: 10px 0; display: block; }
        .btn { padding: 10px 20px; cursor: pointer; border: none; background: #e91e63; color: white; border-radius: 5px; }
    </style>
</head>
<body>

    <h2>وەسڵ</h2>
    <input type="text" id="customerName" placeholder="ناوی کڕیار">
    <input type="number" id="total" placeholder="کۆی گشتی">
    <button class="btn" onclick="saveReceipt()">پاشەکەوتکردن</button>
    <br><br>
    <a href="dashboard.html">گەڕانەوە</a>

    <script>
        // کاتێک لاپەڕەکە دەکرێتەوە، بزانە ئایا ئیدیتە یان نوێیە
        document.addEventListener('DOMContentLoaded', () => {
            let editIndex = localStorage.getItem('editIndex');
            if (editIndex !== null) {
                let receipts = JSON.parse(localStorage.getItem('savedReceipts'));
                let r = receipts[editIndex];
                document.getElementById('customerName').value = r.name;
                document.getElementById('total').value = r.total;
            }
        });

        function saveReceipt() {
            let receipts = JSON.parse(localStorage.getItem('savedReceipts')) || [];
            let editIndex = localStorage.getItem('editIndex');
            
            let newReceipt = {
                name: document.getElementById('customerName').value,
                total: document.getElementById('total').value,
                status: 'بارکراو',
                date: new Date().toISOString()
            };

            if (editIndex !== null) {
                // ئەگەر ئیدیت بوو، بە جێگەی پێشوودا دایبنێ
                receipts[editIndex] = newReceipt;
                localStorage.removeItem('editIndex');
            } else {
                // ئەگەر وەسڵی نوێ بوو
                receipts.push(newReceipt);
            }
            
            localStorage.setItem('savedReceipts', JSON.stringify(receipts));
            alert('بە سەرکەوتوویی پاشەکەوت کرا');
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
