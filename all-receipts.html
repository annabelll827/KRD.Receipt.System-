<div style="max-width:900px; margin:auto;">
    <h3>هەموو وەسڵەکان</h3>
    <table id="table" border="1" style="width:100%;"></table>
    <script>
        let receipts = JSON.parse(localStorage.getItem('savedReceipts') || '[]');
        let t = document.getElementById('table');
        receipts.forEach((r, i) => {
            t.innerHTML += `<tr><td>${r.customerName}</td><td>$${r.grandTotal}</td>
            <td><button onclick="edit(${i})">دەستکاری</button>
            <button onclick="del(${i})">سڕینەوە</button></td></tr>`;
        });
        function del(i) {
            let trash = JSON.parse(localStorage.getItem('trashReceipts') || '[]');
            trash.push(receipts[i]);
            localStorage.setItem('trashReceipts', JSON.stringify(trash));
            receipts.splice(i, 1);
            localStorage.setItem('savedReceipts', JSON.stringify(receipts));
            location.reload();
        }
        function edit(i) { localStorage.setItem('editIndex', i); location.href='create-receipt.html'; }
    </script>
</div>
