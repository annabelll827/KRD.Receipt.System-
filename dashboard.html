<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبۆردی سەرەکی</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .nav-actions { margin-bottom: 20px; }
        .nav-btn { background: #2c3e50; color: white; padding: 10px 15px; border-radius: 5px; text-decoration: none; display: inline-block; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        th { background: #eee; padding: 12px; font-size: 14px; border: 1px solid #ddd; }
        td { padding: 12px; border: 1px solid #ddd; text-align: center; font-size: 14px; }
        .del-btn { background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>داشبۆردی سەرەکی</h2>
    <div class="nav-actions">
        <a href="create-receipt.html" class="nav-btn">+ دروستکردنی وەسڵی نوێ</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>کڕیار</th>
                <th>ژمارەی وەسڵ</th>
                <th>کۆی گشتی</th>
                <th>کردار</th>
            </tr>
        </thead>
        <tbody id="dashboardBody"></tbody>
    </table>
</div>

<script>
    function loadReceipts() {
        let receipts = JSON.parse(localStorage.getItem('savedReceipts')) || [];
        let body = document.getElementById('dashboardBody');
        body.innerHTML = '';
        
        receipts.forEach((r, index) => {
            body.innerHTML += `
                <tr>
                    <td>${r.customerName || '-'}</td>
                    <td>${r.receiptNumber || '-'}</td>
                    <td>${r.grandTotal || '0'}</td>
                    <td><button class="del-btn" onclick="deleteReceipt(${index})">سڕینەوە</button></td>
                </tr>
            `;
        });
    }

    function deleteReceipt(index) {
        if(confirm('دڵنیای لە سڕینەوەی؟')) {
            let receipts = JSON.parse(localStorage.getItem('savedReceipts'));
            receipts.splice(index, 1);
            localStorage.setItem('savedReceipts', JSON.stringify(receipts));
            loadReceipts();
        }
    }

    loadReceipts();
</script>

</body>
</html>
