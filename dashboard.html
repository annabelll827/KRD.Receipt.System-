<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>داشبۆردی گشتی</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .nav-btn { background: #2c3e50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        table { width: 100%; border-collapse: collapse; background: #fff; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: center; }
        th { background: #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>داشبۆردی سەرەکی</h2>
    <a href="create-receipt.html" class="nav-btn">+ دروستکردنی وەسڵی نوێ</a>
    <a href="reports.html" class="nav-btn" style="background:#e91e63">ڕاپۆرتەکان</a>

    <table>
        <thead>
            <tr><th>کڕیار</th><th>ژمارەی وەسڵ</th><th>کۆی گشتی</th><th>کردار</th></tr>
        </thead>
        <tbody id="dashboardBody"></tbody>
    </table>
</div>

<script>
    function loadReceipts() {
        let receipts = JSON.parse(localStorage.getItem('savedReceipts')) || [];
        let body = document.getElementById('dashboardBody');
        body.innerHTML = '';
        
        receipts.forEach((r, index) => {
            body.innerHTML += `
                <tr>
                    <td>${r.customerName || 'بێ ناو'}</td>
                    <td>${r.receiptNumber || '-'}</td>
                    <td>$${r.grandTotal || 0}</td>
                    <td>
                        <button onclick="editReceipt(${index})">دەستکاری</button>
                        <button onclick="deleteReceipt(${index})">سڕینەوە</button>
                    </td>
                </tr>
            `;
        });
    }

    function editReceipt(index) {
        localStorage.setItem('editIndex', index);
        window.location.href = 'create-receipt.html';
    }

    function deleteReceipt(index) {
        let receipts = JSON.parse(localStorage.getItem('savedReceipts'));
        receipts.splice(index, 1);
        localStorage.setItem('savedReceipts', JSON.stringify(receipts));
        loadReceipts();
    }

    loadReceipts();
</script>

</body>
</html>
