<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ROMA STONE - داشبۆرد</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .grid-stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #ddd; }
        .card div { font-size: 22px; font-weight: bold; }
        .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { padding: 15px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; }
        .btn-pink { background: #e91e63; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h3>ROMA STONE</h3>
    <div class="grid-stats">
        <div class="card"><div id="total">$0</div>کۆی گشتی</div>
        <div class="card"><div id="loaded">0</div>وەسڵی بارکراو</div>
        <div class="card"><div id="debt">0</div>وەسڵی قەرز</div>
        <div class="card"><div id="unpaid">0</div>وەسڵی پارەنەدراو</div>
    </div>
    <div class="menu-grid">
        <button class="btn" onclick="location.href='all-receipts.html'">هەموو وەسڵەکان</button>
        <button class="btn btn-pink" onclick="location.href='create-receipt.html'">+ دروستکردنی وەسڵ</button>
        <button class="btn" onclick="location.href='trash.html'">سندوقی سڕاوەکان</button>
        <button class="btn" onclick="location.href='reports.html'">ڕاپۆرتەکان</button>
    </div>
</div>
<script>
    let receipts = JSON.parse(localStorage.getItem('savedReceipts') || '[]');
    document.getElementById('total').innerText = '$' + receipts.reduce((sum, r) => sum + parseFloat(r.grandTotal || 0), 0);
    document.getElementById('loaded').innerText = receipts.filter(r => r.status === 'بارکراو').length;
    document.getElementById('debt').innerText = receipts.filter(r => r.status === 'قەرز').length;
    document.getElementById('unpaid').innerText = receipts.filter(r => r.status === 'پارەنەدراو').length;
</script>
</body>
</html>
