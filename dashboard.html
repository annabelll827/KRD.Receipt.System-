<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>داشبۆرد | KRD Receipt System</title>
    <!-- بەستنەوەی ئایکۆنەکان -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 30px;
            text-align: center;
        }

        .logo-area {
            font-size: 50px;
            color: #e91e63;
            margin-bottom: 10px;
        }

        .welcome-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .system-subtitle {
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        /* ستایلی دوگمەکانی مێنوو */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-menu {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            color: #2c3e50;
            font-size: 15px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .btn-menu:hover {
            background-color: #e91e63;
            color: #ffffff;
            border-color: #e91e63;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(233, 30, 99, 0.2);
        }

        .btn-menu i {
            font-size: 18px;
        }

        /* دوگمەی چوونە دەرەوە */
        .btn-logout {
            margin-top: 25px;
            background-color: #fff;
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .btn-logout:hover {
            background-color: #e74c3c;
            color: #fff;
            border-color: #e74c3c;
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- بەشی سەرەوە و لۆگۆ -->
        <div class="logo-area">
            <i class="fa-solid fa-chart-line"></i>
        </div>
        <div class="welcome-title">بەخێربێیت بۆ داشبۆرد</div>
        <div class="system-subtitle">سیستەمی بەڕێوەبردنی وەسڵەکانی KRD</div>

        <!-- مێنووی دوگمە سەرەکییەکان -->
        <div class="menu-buttons">
            
            <a href="create-receipt.html" class="btn-menu">
                <i class="fa-solid fa-file-circle-plus"></i>
                دروستکردنی وەسڵی نوێ
            </a>

            <a href="all-receipts.html" class="btn-menu">
                <i class="fa-solid fa-folder-open"></i>
                هەموو وەسڵەکان
            </a>

            <!-- دوگمەی چوونەدەرەوە -->
            <button onclick="logout()" class="btn-menu btn-logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                چوونەدەرەوە لە سیستەم
            </button>

        </div>

    </div>

    <script>
        // فەرمانی چوونەدەرەوە و گەڕانەوە بۆ لاپەڕەی سەرەکی
        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.replace("index.html");
        }
    </script>

</body>
</html>
