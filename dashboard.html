<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ROMA STONE</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { background: #dcdcdc; padding: 10px; display: flex; justify-content: space-between; border-radius: 5px; margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; text-align: center; border: 1px solid #ddd; }
        .second-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .actions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn { padding: 15px; border: none; border-radius: 5px; cursor: pointer; background: white; border: 1px solid #ddd; }
        .btn-pink { background: #e91e63; color: white; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div><strong>ROMA STONE</strong> - کارگەی ڕۆما</div>
        <button>دەرچوون لە سیستەم</button>
    </div>
    <div class="stats-grid">
        <div class="stat-card"><div>$0</div>کۆی گشتی</div>
        <div class="stat-card"><div>0</div>وەسڵی پارەدراو</div>
        <div class="stat-card"><div>0</div>وەسڵی پارەنەدراو</div>
        <div class="stat-card"><div>0</div>وەسڵی قەرز</div>
    </div>
    <div class="second-row">
        <div class="stat-card"><div>$0</div>فرۆشی مانگانە</div>
        <div class="stat-card"><div>$0</div>فرۆشی هەفتانە</div>
        <div class="stat-card"><div>$0</div>فرۆشی ئەمرۆ</div>
    </div>
    <div class="actions-grid">
        <button class="btn" onclick="location.href='all-receipts.html'">هەموو وەسڵەکان</button>
        <button class="btn btn-pink" onclick="location.href='create-receipt.html'">+ دروستکردنی وەسڵ</button>
        <button class="btn">سەندوقی سڕاوەکان</button>
        <button class="btn">ڕاپۆرتەکان</button>
        <button class="btn">کاڵا پاشەکەوتەکان</button>
        <button class="btn">پانێڵی بەڕێوبەر</button>
    </div>
</div>
</body>
</html>
